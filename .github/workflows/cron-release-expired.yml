name: cron-release-expired

on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch:

jobs:
  call-release-expired:
    runs-on: ubuntu-latest
    steps:
      - name: Call release-expired route
        env:
          DEPLOYMENT_URL: ${{ secrets.DEPLOYMENT_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Missing DEPLOYMENT_URL secret"; exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"; exit 1
          fi
          curl -fsS -H "x-cron-secret: $CRON_SECRET" "$DEPLOYMENT_URL/api/cron/release-expired"
